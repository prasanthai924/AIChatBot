name: Security Scan

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

jobs:
  secret-scanning:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 🔐 Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 📦 Node.js dependencies
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔍 Check vulnerabilities
        run: npm audit || true

  gitignore-check:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🚫 Verify sensitive files are ignored
        run: |
          echo "Checking .gitignore rules..."

          # Check .env files
          if grep -q "^\.env$" .gitignore; then
            echo "✅ .env is ignored"
          else
            echo "⚠️ .env is NOT explicitly ignored"
          fi

          # Check backend/.env
          if grep -q "backend/\.env" .gitignore; then
            echo "✅ backend/.env is ignored"
          else
            echo "⚠️ backend/.env is NOT ignored"
          fi

          # Check __pycache__
          if grep -q "__pycache__" .gitignore; then
            echo "✅ __pycache__ is ignored"
          else
            echo "⚠️ __pycache__ is NOT ignored"
          fi

          # Check node_modules
          if grep -q "node_modules" .gitignore; then
            echo "✅ node_modules is ignored"
          else
            echo "⚠️ node_modules is NOT ignored"
          fi

          # Check venv
          if grep -q "venv" .gitignore; then
            echo "✅ venv is ignored"
          else
            echo "⚠️ venv is NOT ignored"
          fi

          echo ""
          echo "✅ Security check completed!"

      - name: 🚨 Fail if .env files are tracked
        run: |
          if git ls-files | grep -E "\.env$|backend/\.env$"; then
            echo "❌ ERROR: .env files are tracked in git!"
            echo "Run: git rm --cached .env backend/.env"
            exit 1
          fi
          echo "✅ No .env files tracked"

  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔍 ESLint check
        run: npx eslint src/ --max-warnings 10 || true
        continue-on-error: true
