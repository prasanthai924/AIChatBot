name: Documentation Check

on:
  push:
    branches: [main, master, develop]
    paths:
      - '**.md'
      - '.github/workflows/documentation.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - '**.md'

jobs:
  markdown-lint:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 📝 Lint markdown files
        uses: nosborn/github-action-markdown-cli@v3.3.0
        with:
          files: .
          config_file: '.github/markdownlint.json'
        continue-on-error: true

  readme-check:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: ✅ Verify README exists
        run: |
          if [ ! -f README.md ]; then
            echo "❌ README.md is missing!"
            exit 1
          fi
          echo "✅ README.md found"

          # Check minimum content
          if [ $(wc -l < README.md) -lt 10 ]; then
            echo "⚠️ README.md is very short (less than 10 lines)"
          else
            echo "✅ README.md has sufficient content"
          fi

      - name: ✅ Verify security documentation
        run: |
          if [ ! -f SECURITY.md ]; then
            echo "⚠️ SECURITY.md is missing"
          else
            echo "✅ SECURITY.md found"
          fi

      - name: ✅ Verify deployment documentation
        run: |
          if [ ! -f README_DEPLOYMENT.md ]; then
            echo "⚠️ README_DEPLOYMENT.md is missing"
          else
            echo "✅ README_DEPLOYMENT.md found"
          fi

  link-check:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🔗 Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
        continue-on-error: true
